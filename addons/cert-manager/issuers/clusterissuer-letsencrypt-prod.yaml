# ACME Let's Encrypt (produção) — cota de emissão semanal; confirme DNS/HTTP01 antes.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: altere@exemplo.com
    privateKeySecretRef:
      name: letsencrypt-prod-issuer
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - http01:
          ingress:
            class: nginx
